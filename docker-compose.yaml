x-common: &common
  restart: unless-stopped
  platform: linux/arm64

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    <<: *common
    image: postgres:16
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 3s
      timeout: 5s
      retries: 10

  nats:
    <<: *common
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # HTTP monitoring

  prometheus:
    <<: *common
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - ingestion
      - frame_fetcher

  grafana:
    <<: *common
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana_dashboard.json:/var/lib/grafana/dashboards/daq.json:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Application services ──────────────────────────────────────────────────────

  ingestion:
    <<: *common
    restart: on-failure   # don't auto-restart after clean exit (DEMO_DURATION_S)
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file: .env
    volumes:
      - chunk_data:/data/chunks
    ports:
      - "9100:9100"   # Prometheus metrics scrape
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  dashboard:
    <<: *common
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    env_file: .env
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      INGESTION_SERVICE: ingestion
      CHUNK_DIR: /data/chunks
    volumes:
      - chunk_data:/data/chunks
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5000:5000"
    depends_on:
      - prometheus

  frame_fetcher:
    <<: *common
    build:
      context: .
      dockerfile: frame_fetcher/Dockerfile
    env_file: .env
    volumes:
      - chunk_data:/data/chunks
    ports:
      - "8000:8000"   # REST API
      - "9101:9100"   # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  grafana_data:
  chunk_data:   # shared NVMe chunk storage — all three app services read/write here
