x-common: &common
  restart: unless-stopped
  platform: linux/arm64
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"
      tag: "{{.Name}}"

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    <<: *common
    image: postgres:16
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-daq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daq}
      POSTGRES_DB:       ${POSTGRES_DB:-daq}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daq}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  nats:
    <<: *common
    image: nats:2.10-alpine

  prometheus:
    <<: *common
    build:
      context: .
      dockerfile: infra/prometheus.Dockerfile
    ports:
      - "9090:9090"
    depends_on:
      - ingestion
      - frame_fetcher

  grafana:
    <<: *common
    build:
      context: .
      dockerfile: infra/grafana.Dockerfile
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Application services ──────────────────────────────────────────────────────

  ingestion:
    <<: *common
    restart: on-failure   # don't auto-restart after clean exit (DEMO_DURATION_S)
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file: .env
    volumes:
      - chunk_data:/data/chunks
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  dashboard:
    <<: *common
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    env_file: .env
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      INGESTION_SERVICE: ingestion
      CHUNK_DIR: /data/chunks
      SERVICE_URL_FRAME_FETCHER: http://frame_fetcher:8000
    volumes:
      - chunk_data:/data/chunks
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5000:5000"
    depends_on:
      - prometheus

  frame_fetcher:
    <<: *common
    build:
      context: .
      dockerfile: frame_fetcher/Dockerfile
    env_file: .env
    expose:
      - "8000"
    volumes:
      - chunk_data:/data/chunks
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  grafana_data:
  chunk_data:   # shared NVMe chunk storage — all three app services read/write here
