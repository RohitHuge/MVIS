global:
  scrape_interval:     2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: daq_ingestion
    static_configs:
      - targets: ["ingestion:9100"]
    metrics_path: /metrics

  - job_name: daq_frame_fetcher
    static_configs:
      - targets: ["frame_fetcher:9100"]
    metrics_path: /metrics
